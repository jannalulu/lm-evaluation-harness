include: _babilong_common_yaml
task: babilong_qa2
test_split: qa2
custom_dataset: !function common_utils.load_babilong
doc_to_text: 'I give you context with the facts about locations and actions of different persons hidden in some random text and a question.\nYou need to answer the question based only on the information from the facts.\nIf a person got an item in the first location and travelled to the second location the item is also in the second location.\nIf a person dropped an item in the first location and moved to the second location the item remains in the first location.\nAlways return your answer in the following format:\nThe "item" is in "location". Do not write anything else after that.\n{{input}}\n{{question}}\n'
fewshot_config:
  sampler: first_n
  samples:
    - input: "Charlie went to the kitchen. Charlie got a bottle. Charlie moved to the balcony. Where is the bottle?"
      target: "The bottle is in the balcony."
    - input: "Alan moved to the garage. Alan got a screw driver. Alan moved to the kitchen. Where is the screw driver?"
      target: "The screw driver is in the kitchen."
