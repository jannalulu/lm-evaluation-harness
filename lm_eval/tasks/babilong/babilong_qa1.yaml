include: _babilong_common_yaml
task: babilong_qa1
dataset_name: "0k"
test_split: qa1
process_docs: !function common_utils.process_docs
doc_to_text: 'I will give you context with the facts about positions of different persons hidden in some random text and a question. You need to answer the question based only on the information from the facts. If a person was in different locations, use the latest location to answer the question.\nAlways return your answer in the following format:\nThe most recent location of ’person’ is ’location’. Do not write anything else after that.\n{{input}}\n{{question}}\n'

fewshot_config:
  sampler: first_n
  samples:
    - input: "Charlie went to the hallway. Judith come back to the kitchen. Charlie travelled to balcony. Where is Charlie?"
      target: "The most recent location of Charlie is balcony."
    - input: "Alan moved to the garage. Charlie went to the beach. Alan went to the shop. Rouse travelled to balcony. Where is Alan?"
      target: "The most recent location of Alan is shop."
