include: _babilong_common_yaml
task: babilong_qa4
test_split: qa4
custom_dataset: !function common_utils.load_babilong
doc_to_text: 'I will give you context with the facts about different people, their location and actions, hidden in some random text and a question.\nYou need to answer the question based only on the information from the facts.\nYour answer should contain only one word - location. Do not write anything else after that.\n{{input}}\n{{question}}\n'
fewshot_config:
  sampler: first_n
  samples:
    - input: "The hallway is south of the kitchen. The bedroom is north of the kitchen. What is the kitchen south of?"
      target: "bedroom"
    - input: "The garden is west of the bedroom. The bedroom is west of the kitchen. What is west of the bedroom?"
      target: "garden"
