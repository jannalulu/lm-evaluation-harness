include: _babilong_common_yaml
task: babilong_qa6
test_split: qa6
custom_dataset: !function common_utils.load_babilong
doc_to_text: 'I will give you context with the facts about people and their locations hidden in some random text and a question. You need to answer the question based only on the information from the facts. If a person was in different locations, use the latest location the person was in to answer the question.\n{{input}}\n\nYour answer should contain only one word - $yes$ or $no$. Do not write anything else after that.\nDo not explain your answer.\n'
fewshot_config:
  sampler: first_n
  samples:
    - input: "John travelled to the hallway. John travelled to the garden. Is John in the garden?"
      target: "yes"
    - input: "Mary went to the office. Daniel journeyed to the hallway. Mary went to the bedroom. Sandra went to the garden. Is Mary in the office?"
      target: "no"
